<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body style="font-family:sans-serif;padding:20px">
<h2>Connection Test</h2>
<button onclick="testWrite()">1. Send Test Expense</button>
<button onclick="testRead()">2. Read Sheet</button>
<button onclick="testReceipt()">3. Test Receipt Link</button>
<pre id="out" style="background:#eee;padding:10px;margin-top:10px;white-space:pre-wrap;word-break:break-all"></pre>
<script>
const URL = 'https://script.google.com/macros/s/AKfycbx9MDC8ITsFSQLnHUrAqUfn03Yv8CwqLCsHvIV60eeMmORqr3QUjrvLYjKzDSakEXrtgA/exec';
const ID = 'test_' + Date.now();
function log(m){document.getElementById('out').textContent+=m+'\n';}
function ping(url){return new Promise(r=>{const s=document.createElement('script');s.src=url+'&_cb='+Date.now();s.onload=()=>{s.remove();r('✅ loaded');};s.onerror=()=>{s.remove();r('⚠️ onerror (may still work)');};document.head.appendChild(s);setTimeout(()=>{try{s.remove();}catch(e){}r('⏱ timeout');},8000);});}

function testWrite(){
  log('Sending expense ID: '+ID);
  const p=new URLSearchParams({action:'add',type:'expense',date:'2026-07-05',vendor:'LINKTEST',desc:'Testing receipt link',category:'Advertising',amount:1,currency:'USD',method:'Cash',taxDeductible:'No',receiptUrl:'https://drive.google.com/test-link',id:ID});
  ping(URL+'?'+p).then(r=>log('Write: '+r+' — check sheet!'));
}

async function testRead(){
  log('Reading...');
  try{
    const r=await fetch(URL+'?action=read&type=expense',{mode:'cors'});
    const d=await r.json();
    log('Rows: '+d.rows.length);
    const last=d.rows.slice(-2);
    log(JSON.stringify(last,null,2));
  }catch(e){log('❌ '+e.message);}
}

function testReceipt(){
  log('Testing updateReceipt for ID: '+ID);
  const p=new URLSearchParams({action:'updateReceipt',type:'expense',id:ID,url:'https://drive.google.com/RECEIPT-TEST-LINK-123'});
  ping(URL+'?'+p).then(r=>log('Receipt update: '+r+' — check col 13 in sheet!'));
}
</script>
</body>
</html>
